syntax = "proto3";

package claco.pinochle;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";

option csharp_namespace = "Pinochle.Api";
option go_package = "./pb";

message Board {
    string id = 1;
    repeated Card stock = 2;
    repeated Card discards = 3;
    repeated Meld melds = 4;
}

enum CardSuit {
    Unspecified = 0;
    Clubs = 1;
    Diamonds = 2;
    Hearts = 3;
    Spades = 4;
}

enum GameStatus {
    New = 0;
    Playing = 1;
    Completed = 2;
}

enum ServiceResultCode {
    Ok = 0;
    Error = 1;
}

message Card {
    CardSuit suit = 1;
    string symbol = 2;
}

message Deck {
    repeated Card cards = 1;
}

message Game {
    string id = 1;
    string slug = 2;
    string name = 3;
    Board board = 4;
    repeated Player players = 5;
    GameStatus status = 6;
}

message Meld {}

message Player {}

message PinochleServiceEvent {
    string event = 1;
    google.protobuf.Struct detail = 2;
}

message PinochleServiceResult {
    ServiceResultCode code = 1;
    optional string message = 2;
    repeated PinochleServiceEvent events = 3;
}

message CreateGameRequest {
    string name = 1;
}

message CreateGameResponse {
    PinochleServiceResult result = 1;
    Game game = 2;
}

message GetGameRequest {
    string id = 1;
    string slug = 2;
}

message GetGameResponse {
    PinochleServiceResult result = 1;
    Game game = 2;
}

message ListGamesRequest {

}

message StartGameRequest {
    string id = 1;
    string slug = 2;
}

message StartGameResponse {
    PinochleServiceResult result = 1;
    Game game = 2;
}

service PinochleService {
    rpc CreateGame (CreateGameRequest) returns (CreateGameResponse) {
        option (google.api.http) = {
            post: "/games"
            body: "*"
        };
    };
    rpc GetGame (GetGameRequest) returns (GetGameResponse) {
        option (google.api.http) = {
            get: "/games/{id}",
            additional_bindings {
                get: "/games/lookup"
            }
        };
    };
    rpc ListGames (ListGamesRequest) returns (stream Game) {
        option (google.api.http) = {
            get: "/games"
        };
    };
    rpc StartGame (StartGameRequest) returns (StartGameResponse) {
        option (google.api.http) = {
            post: "/games/start/{id}"
        };
    };
}
